# Propagates the post-transformer namespace into embedded references that
# kustomize's namespace transformer cannot reach (APIService annotation,
# Certificate dnsNames, auth-reader subject). Also restores the auth-reader
# RoleBinding to kube-system after the namespace transformer overwrites it.
# Must be at overlay level: Component replacements run before the namespace
# transformer and would read the wrong (pre-transformer) namespace.
- source:
    kind: ServiceAccount
    name: osac-console-proxy
    fieldPath: metadata.namespace
  targets:
  - select:
      kind: APIService
      name: v1alpha1.console.osac.openshift.io
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: '/'
      index: 0
  - select:
      kind: Certificate
      name: osac-console-proxy
    fieldPaths:
    - spec.dnsNames.1
    - spec.dnsNames.2
    - spec.dnsNames.3
    options:
      delimiter: '.'
      index: 1
  - select:
      kind: RoleBinding
      name: osac-console-proxy-auth-reader
    fieldPaths:
    - subjects.0.namespace
# Restore auth-reader RoleBinding to kube-system (namespace transformer overwrites it)
- source:
    kind: RoleBinding
    name: osac-console-proxy-auth-reader
    fieldPath: metadata.annotations.osac\.openshift\.io/deployment-namespace
  targets:
  - select:
      kind: RoleBinding
      name: osac-console-proxy-auth-reader
    fieldPaths:
    - metadata.namespace
