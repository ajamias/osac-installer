# Pins console-proxy to the "osac" namespace on shared dev clusters.
# The console-proxy registers a cluster-scoped APIService, so only one
# instance can exist per cluster. On shared clusters each developer gets
# their own namespace, but console-proxy is shared and always runs in
# "osac". The SA annotation below carries the target namespace; overlay-
# level replacements read it to override namespace-embedded fields that
# kustomize's namespace transformer cannot reach.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
- secret-reader-rolebinding.yaml

patches:
- target:
    kind: ServiceAccount
    name: osac-console-proxy
  patch: |-
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: osac-console-proxy
      annotations:
        osac.openshift.io/deployment-namespace: osac
